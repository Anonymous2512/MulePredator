    <!--
  Babel Standalone pinned to the stable v7 line. The CDN resolves "@7" to the
  newest, most-patched 7.x automatically, which avoids both (a) an old fixed
  patch that might carry a regression and (b) the brand-new Babel 8 major
  (ESM-only, breaking changes, released mid-2026) that is risky to adopt right
  before a demo. To force an exact version, change "@7" to e.g. "@7.26.4".
  To move to Babel 8, use "@babel/standalone@8".
-->
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <style>
      body {
        margin: 0;
        background: #0f1419;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">

      // ============================================================================
      // MulePredator - SOC analyst fraud-investigation console (demo-ready build)
      // Runs standalone on mock data. To wire to the live FastAPI service, set
      // USE_LIVE_API = true and point API_BASE at it. Live-fetch seams marked "LIVE SEAM".

      const API_BASE = "http://localhost:8000";

      const C = {

        lineHi: "#3A4757",
        text: "#D6DEE8",

        investigate: "#E0A03C",

        clear: "#5FB07A",

      const TIER_META = {
        high_priority: { label: "HIGH PRIORITY", color: C.high, order: 0 },
        investigate: { label: "INVESTIGATE", color: C.investigate, order: 1 },
        monitor: { label: "MONITOR", color: C.monitor, order: 2 },
        none: { label: "CLEAR", color: C.clear, order: 3 },
      };

      function rnd(a, b) {
        return Math.floor(Math.random() * (b - a + 1)) + a;
      }
      function nowStamp() {
        const d = new Date();
        return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}:${String(d.getSeconds()).padStart(2, "0")}`;
      }
      function mkTxn(o) {
        return {
          ip: "49." + rnd(0, 255) + "." + rnd(0, 255) + "." + rnd(1, 254),
          device: "dev-" + Math.random().toString(16).slice(2, 10),
          tls: "TLSv1.3",
          key: null,
          fs: true,
          vol: +(Math.random() * 40).toFixed(1),
          hndl_risk: false,
          new_device: false,
          cluster: null,
          cluster_details: null,
          ...o,
        };
      }

      // Demo-mode stand-in for a real /score `cluster_details` payload -- same
      // shape the API returns, just fabricated so offline demo mode has
      // something to render through the one real NetworkView code path.
      function mkClusterDetails(collectorLabel, n) {
        return {
          collector_account_id: collectorLabel,
          collector_graph_risk_score: 0.8 + Math.random() * 0.2,
          sender_account_ids: Array.from(
            { length: n },
            (_, i) => `sender_${i}`,
          ),
          spokes: Array.from({ length: n }, (_, i) => ({
            account_id: `sender_${i}`,
            amount_inr: 8000 + rnd(0, 40000),
            timestamp: new Date().toISOString(),
          })),
        };
      }

      const STATS = {

      function ConvergenceMeter({ graph, cyber, quantum, signals, compact }) {
        const lane = (label, val, color, fired) => (
          <div
            style={{
              display: "flex",
              alignItems: "center",
              gap: 6,
              opacity: fired ? 1 : 0.32,
            }}
          >
            <span
              style={{
                width: compact ? 30 : 42,
                fontSize: 9,
                letterSpacing: 0.5,
                color: C.textDim,
                fontFamily: "'JetBrains Mono',monospace",
              }}
            >
              {label}
            </span>
            <div
              style={{
                flex: 1,
                height: compact ? 4 : 6,
                background: C.bg,
                borderRadius: 2,
                overflow: "hidden",
                position: "relative",
              }}
            >
              <div
                style={{
                  position: "absolute",
                  inset: 0,
                  width: `${val * 100}%`,
                  background: color,
                  borderRadius: 2,
                  transition: "width .4s ease",

              />
            </div>
            <span
              style={{
                width: 26,
                textAlign: "right",
                fontSize: 10,
                color: fired ? color : C.textFaint,
                fontFamily: "'JetBrains Mono',monospace",
              }}
            >
              {val.toFixed(2)}
            </span>
          </div>
        );
        return (
          <div
            style={{
              display: "flex",
              flexDirection: "column",
              gap: compact ? 3 : 5,
              width: "100%",
            }}
          >
            {lane("GRAPH", graph, C.graph, graph >= 0.3)}
            {lane("CYBER", cyber, C.cyber, cyber >= 0.3)}
            {!compact && lane("QUANT", quantum, C.quantum, quantum >= 0.6)}
            {!compact && (
              <div
                style={{
                  marginTop: 2,
                  fontSize: 9,
                  letterSpacing: 1,
                  fontFamily: "'JetBrains Mono',monospace",
                  color: signals >= 2 ? C.high : C.textDim,
                }}
              >
                {signals >= 2
                  ? "◆ CONVERGED - 2 INDEPENDENT FRAUD SIGNALS"
                  : "○ SINGLE SIGNAL - BELOW ALERT THRESHOLD"}
              </div>
            )}
          </div>
        );
      }

      function NetworkView({ details }) {
        const w = 440,
          h = 320,
          cx = w / 2,
          cy = h / 2;
        const spokeIds = details ? details.sender_account_ids : [];
        const pos = useMemo(() => {
          if (!details) return {};
          const p = { collector: { x: cx, y: cy } };
          spokeIds.forEach((id, idx) => {
            const ang = (idx / Math.max(spokeIds.length, 1)) * Math.PI * 2;
            p[id] = {
              x: cx + Math.cos(ang) * 135,
              y: cy + Math.sin(ang) * 105,
            };
          });
          return p;
        }, [details]);

        if (!details) {
          return (
            <div
              style={{
                height: 280,
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                justifyContent: "center",
                color: C.textFaint,
                fontFamily: "'JetBrains Mono',monospace",
                fontSize: 12,
                gap: 8,
              }}
            >
              <div
                style={{
                  width: 44,
                  height: 44,
                  borderRadius: "50%",
                  border: `1px dashed ${C.line}`,
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  fontSize: 20,
                }}
              >
                ◯
              </div>
              No active mule cluster
              <span
                style={{
                  fontSize: 10,
                  color: C.textFaint,
                  maxWidth: 240,
                  textAlign: "center",
                  lineHeight: 1.5,
                }}
              >
                Select a transaction whose receiving account shows fan-in
                risk to render its real senders and collector.
              </span>
            </div>
          );
        }
        return (
          <svg
            viewBox={`0 0 ${w} ${h}`}
            style={{ width: "100%", height: "auto" }}
          >
            {spokeIds.map((id) => {
              const a = pos[id],
                b = pos.collector;
              if (!a || !b) return null;
              const spoke = details.spokes.find((s) => s.account_id === id);
              const big = spoke && spoke.amount_inr > 100000;
              return (
                <line
                  key={id}
                  x1={a.x}
                  y1={a.y}
                  x2={b.x}
                  y2={b.y}
                  stroke={big ? C.monitor : C.lineHi}
                  strokeWidth={big ? 2 : 1}
                  opacity={big ? 0.8 : 0.5}
                />
              );
            })}
            <circle
              cx={pos.collector.x}
              cy={pos.collector.y}
              r={16}
              fill={C.high}
              stroke={C.bg}
              strokeWidth={2}
            />
            <text
              x={pos.collector.x}
              y={pos.collector.y + 16 + 12}
              textAnchor="middle"
              fontSize={9}
              fill={C.textDim}
              fontFamily="'JetBrains Mono',monospace"
            >
              {details.collector_account_id}
            </text>
            {spokeIds.map((id) => {
              const p = pos[id];
              if (!p) return null;
              return (
                <circle
                  key={id}
                  cx={p.x}
                  cy={p.y}
                  r={8}
                  fill={`rgba(139,127,224,0.75)`}
                  stroke={C.bg}
                  strokeWidth={2}
                />
              );
            })}
          </svg>
        );
      }

      function StatCard({ label, value, sub, color }) {
        return (
          <div
            style={{
              flex: 1,
              padding: "12px 14px",
              background: C.panel,
              border: `1px solid ${C.line}`,
              borderRadius: 6,
            }}
          >
            <div
              style={{
                fontSize: 9,
                letterSpacing: 1,
                color: C.textDim,
                fontFamily: "'JetBrains Mono',monospace",
                marginBottom: 6,
              }}
            >
              {label}
            </div>
            <div
              style={{
                fontSize: 22,
                fontWeight: 600,
                color: color || C.text,
                fontFamily: "'JetBrains Mono',monospace",
                lineHeight: 1,
              }}
            >
              {value}
            </div>
            {sub && (
              <div
                style={{
                  fontSize: 10,
                  color: C.textFaint,
                  marginTop: 4,
                  fontFamily: "'JetBrains Mono',monospace",
                }}
              >
                {sub}
              </div>
            )}
          </div>
        );
      }

      function Toggle({ on, onClick, label, activeColor }) {
        return (
          <button
            onClick={onClick}
            style={{
              display: "flex",
              alignItems: "center",
              gap: 7,
              padding: "6px 11px",
              fontSize: 10,
              fontFamily: "'JetBrains Mono',monospace",
              letterSpacing: 0.5,
              background: on ? C.panelHi : "transparent",
              color: on ? C.text : C.textDim,
              border: `1px solid ${on ? activeColor || C.lineHi : C.line}`,
              borderRadius: 5,
              cursor: "pointer",
            }}
          >
            <span
              style={{
                width: 8,
                height: 8,
                borderRadius: "50%",
                background: on ? activeColor || C.clear : C.textFaint,
                boxShadow: on ? `0 0 6px ${activeColor || C.clear}` : "none",
              }}
            />
            {label}
          </button>
        );
      }

      function MetaRow({ k, v, color }) {
        return (
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              padding: "6px 0",
              borderBottom: `1px solid ${C.line}`,
              fontFamily: "'JetBrains Mono',monospace",
              fontSize: 11,
            }}
          >
            <span style={{ color: C.textDim }}>{k}</span>
            <span style={{ color: color || C.text }}>{v}</span>
          </div>
        );
      }

      function App() {
        const [txns, setTxns] = useState(MOCK_TXNS);
        const [selected, setSelected] = useState(MOCK_TXNS[0]);
        const [tierFilter, setTierFilter] = useState("all");
        const [scopeFilter, setScopeFilter] = useState("all");
        const [live, setLive] = useState(false);
        const [demoMode, setDemoMode] = useState(false);
        const liveRef = useRef(null);
        const demoRef = useRef(null);

        // LIVE FEED
        useEffect(() => {
          if (!live) {
            if (liveRef.current) clearInterval(liveRef.current);
            return;
          }
          liveRef.current = setInterval(async () => {
            if (USE_LIVE_API) {
              try {
                // LIVE SEAM
                const r = await fetch(`${API_BASE}/feed?limit=100`);
                const j = await r.json();
                if (j.feed && j.feed.length)
                  setTxns((prev) => mergeApi(j.feed, prev));
              } catch (e) {
                /* API unreachable; keep current data */
              }
            } else {
              const base = MOCK_TXNS[rnd(0, MOCK_TXNS.length - 1)];
              setTxns((prev) =>
                [
                  {
                    ...base,
                    txn_id: Math.random().toString(16).slice(2, 18),
                    ts: nowStamp(),
                  },
                  ...prev,
                ].slice(0, 120),
              );
            }
          }, 2200);
          return () => clearInterval(liveRef.current);
        }, [live]);

        // DEMO MODE - inject a fabricated high-risk alert every 5s.
        // These are SIMULATED, not real detections; the UI labels them "SIM" so a
        // fabricated alert is never mistaken for a genuine one.
        useEffect(() => {
          if (!demoMode) {
            if (demoRef.current) clearInterval(demoRef.current);
            return;
          }
          demoRef.current = setInterval(() => {
            const hasRing = Math.random() > 0.4;
            const inj = mkTxn({
              txn_id: Math.random().toString(16).slice(2, 18),
              account: Math.random().toString(16).slice(2, 10),
              tier: "high_priority",
              fraud_score: +(0.85 + Math.random() * 0.15).toFixed(2),
              graph: +(0.8 + Math.random() * 0.2).toFixed(2),
              cyber: +(0.6 + Math.random() * 0.4).toFixed(2),
              quantum: hasRing && Math.random() > 0.6 ? 0.85 : 0.0,
              signals: 2,
              amount: rnd(20000, 150000),
              new_device: true,
              reason:
                "CONVERGED (2 independent signals) - cyber: failed login burst; device/IP churn; graph: extreme fan-in (possible collector/hub)",
              ts: nowStamp(),
              cluster_details: hasRing
                ? mkClusterDetails(
                    Math.random().toString(16).slice(2, 10),
                    rnd(3, 12),
                  )
                : null,
              simulated: true,
            });
            setTxns((prev) => [inj, ...prev].slice(0, 120));
          }, 5000);
          return () => clearInterval(demoRef.current);
        }, [demoMode]);

        const visible = useMemo(() => {
          let list = txns;
          if (scopeFilter === "suspicious")
            list = list.filter((t) => t.signals === 1);
          else if (scopeFilter === "flagged")
            list = list.filter((t) => t.signals >= 2);
          if (tierFilter !== "all")
            list = list.filter((t) => t.tier === tierFilter);
          return [...list].sort(
            (a, b) => TIER_META[a.tier].order - TIER_META[b.tier].order,
          );
        }, [txns, scopeFilter, tierFilter]);

        const quantumFeed = useMemo(
          () =>
            txns
              .filter((t) => t.hndl_risk)
              .slice(0, 12)
              .map((t) => ({
                account: t.account,
                tls: t.tls,
                key: t.key,
                fs: t.fs,
                vol: t.vol,
                score: t.quantum,
              })),
          [txns],
        );

        const clusterDetails = selected ? selected.cluster_details : null;

        return (
          <div
            style={{
              minHeight: "100vh",
              background: C.bg,
              color: C.text,
              fontFamily: "'Inter',system-ui,sans-serif",
            }}
          >
            <style>{`@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap');
        *{box-sizing:border-box;} ::-webkit-scrollbar{width:8px;height:8px;}
        ::-webkit-scrollbar-thumb{background:${C.line};border-radius:4px;} ::-webkit-scrollbar-track{background:transparent;}`}</style>

            <div
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                padding: "14px 22px",
                borderBottom: `1px solid ${C.line}`,
                background: C.panel,
              }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <div
                  style={{
                    width: 28,
                    height: 28,
                    borderRadius: 6,
                    background: `linear-gradient(135deg, ${C.high}, ${C.graph})`,
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    fontSize: 14,
                    fontWeight: 700,
                  }}
                >
                  M
                </div>
                <div>
                  <div
                    style={{
                      fontSize: 15,
                      fontWeight: 600,
                      letterSpacing: 0.3,
                    }}
                  >
                    MulePredator
                  </div>
                  <div
                    style={{
                      fontSize: 10,
                      color: C.textDim,
                      fontFamily: "'JetBrains Mono',monospace",
                      letterSpacing: 0.5,
                    }}
                  >
                    UPI FRAUD INTELLIGENCE · SOC CONSOLE
                  </div>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <Toggle
                  on={demoMode}
                  onClick={() => setDemoMode((v) => !v)}
                  label={demoMode ? "DEMO MODE - SIMULATED" : "DEMO MODE"}
                  activeColor={C.monitor}
                />
                <Toggle
                  on={live}
                  onClick={() => setLive((v) => !v)}
                  label={live ? "LIVE FEED ON" : "LIVE FEED"}
                  activeColor={C.clear}
                />
              </div>
            </div>

            <div style={{ display: "flex", gap: 12, padding: "16px 22px" }}>
              <StatCard
                label="TRANSACTIONS SCORED"
                value={STATS.scored.toLocaleString()}
                sub="synthetic UPI stream"

      // LIVE SEAM: merge API /feed items into the txn stream, de-duping by id
      function mergeApi(apiTxns, prev) {
        const seen = new Set(prev.map((p) => p.txn_id));
        const mapped = apiTxns
          .filter((a) => !seen.has(String(a.txn_id)))
          .map((a) =>
            mkTxn({
              txn_id: String(a.txn_id),
              account: String(a.account_id || a.account_id_from || "").slice(
                -8,
              ),
              tier: a.alert_tier || "none",
              fraud_score: a.fraud_score ?? 0,
              graph: a.graph_risk_score ?? 0,
              cyber: a.cyber_risk_score ?? 0,
              quantum: a.quantum_exposure_score ?? 0,
              signals: a.n_fraud_signals ?? 0,
              amount: Math.round(a.amount_inr || 0),
              hndl_risk: (a.quantum_exposure_score ?? 0) >= 0.6,
              reason: a.reason || "",
              cluster_details: a.cluster_details || null,
              ts: nowStamp(),
            }),
          );
        return [...mapped, ...prev].slice(0, 120);
      }
